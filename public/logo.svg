<svg viewBox="0 0 170 40" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Emblem (40 × 40, center 20,20) ── -->

  <!-- Soft background fill -->
  <circle cx="20" cy="20" r="18" fill="#EEF4FF"/>

  <!-- Subtle outer navy ring -->
  <circle cx="20" cy="20" r="18" stroke="#0F2744" stroke-width="0.75" opacity="0.12"/>

  <!-- Orbit ring — sits AROUND the SDM letters, not through them -->
  <circle cx="20" cy="20" r="14" stroke="#1565C0" stroke-width="1.6"/>

  <!-- Node — top-right (~40°) -->
  <circle cx="29" cy="9.3" r="2.4" fill="#1565C0"/>
  <circle cx="29" cy="9.3" r="4" stroke="#1565C0" stroke-width="0.7" opacity="0.25"/>

  <!-- Node — bottom-left (~220°) -->
  <circle cx="11" cy="30.7" r="1.5" fill="#1565C0" opacity="0.4"/>

  <!-- SDM text — large, centered inside the ring -->
  <text x="20" y="23.5"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="9.5"
    fill="#0F2744"
    letter-spacing="0.5">SDM</text>

  <!-- ── Brand text ── -->

  <text x="46" y="19"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="15"
    fill="#0F2744">Smart Data</text>

  <text x="47.5" y="32"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="8"
    fill="#1565C0"
    letter-spacing="2.4">MANAGEMENT</text>

</svg>
